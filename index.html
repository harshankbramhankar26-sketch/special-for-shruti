<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Shruti Kawale</title>
    <style>
        body {
            background-color: #fff0f3;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 350px;
        }
        h1 { color: #ff4d6d; font-size: 24px; }
        p { color: #555; font-size: 18px; }
        .buttons {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        button {
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }
        #yesBtn { background-color: #ff4d6d; color: white; }
        #noBtn { background-color: #adb5bd; color: white; position: relative; }
        .footer { margin-top: 25px; font-weight: bold; color: #ff4d6d; }
    </style>
</head>
<body>

    <div class="container" id="mainBox">
        <h1>Hi Shruti Kawale! ❤️</h1>
        <p>There's something I've been wanting to ask you...</p>
        <p><strong>Will you be mine?</strong></p>

        <div class="buttons">
            <button id="yesBtn" onclick="accepted()">Yes</button>
            <button id="noBtn" onmouseover="moveButton()">No</button>
        </div>

        <div class="footer">From: SYCROS_16</div>
    </div>

    <script>
        function moveButton() {
            const btn = document.getElementById('noBtn');
            const x = Math.random() * (window.innerWidth - btn.clientWidth);
            const y = Math.random() * (window.innerHeight - btn.clientHeight);
            btn.style.position = 'absolute';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        function accepted() {
            const mainBox = document.getElementById('mainBox');
            mainBox.innerHTML = `
                <h1 style="font-size: 50px;">💖</h1>
                <h1>Thank You Shruti!</h1>
                <p>You've made SYCROS_16 the happiest person!</p>
                <p>Our story starts now... ✨</p>
            `;
        }
    </script>
</body>
</html>
